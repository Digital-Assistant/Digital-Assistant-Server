# Default (Container/Internal) Configuration
quarkus.datasource.db-kind=mariadb
quarkus.datasource.jdbc.url=jdbc:mariadb://127.0.0.1:3306/udan?useSSL=true&trustServerCertificate=true
quarkus.hibernate-search-orm.elasticsearch.hosts=localhost:9200
quarkus.oidc.auth-server-url=http://127.0.0.1:8080/realms/UDAN

# Dev Profile (Host-based development overrides)
%dev.quarkus.datasource.jdbc.url=jdbc:mariadb://127.0.0.1:3306/udan?useSSL=true&trustServerCertificate=true
%dev.quarkus.flyway.jdbc.url=jdbc:mariadb://127.0.0.1:3306/udan?useSSL=true&trustServerCertificate=true
%dev.quarkus.hibernate-search-orm.elasticsearch.hosts=127.0.0.1:9200
%dev.quarkus.oidc.auth-server-url=http://127.0.0.1:8080/realms/UDAN
%dev.quarkus.oidc.tls.verification=none
%dev.quarkus.oidc.UDAN.auth-server-url=http://127.0.0.1:8080/realms/UDAN
%dev.quarkus.oidc.UDAN.tls.verification=none
%dev.quarkus.oidc.UDAN-Plugin.auth-server-url=http://127.0.0.1:8080/realms/UDAN
%dev.quarkus.oidc.UDAN-Plugin.tls.verification=none

# Credentials and shared settings
quarkus.datasource.jdbc.driver=org.mariadb.jdbc.Driver
quarkus.datasource.username=udan
quarkus.datasource.password=udan
quarkus.elasticsearch.devservices.enabled=false
quarkus.oidc.tls.verification=none
quarkus.oidc.client-id=backend-service
quarkus.oidc.credentials.secret=secret

# Update ES schema to match new Long ID types in dev
%dev.quarkus.hibernate-search-orm.schema-management.strategy=drop-and-create
quarkus.flyway.baseline-on-migrate=true
preflight.postgres.username=postgres@udan
preflight.postgres.password=2023@udan
